services:
  mongodb:
    image: mongo:8
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017
      - DB_NAME=householdhullabaloo
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  mongodb_data:
