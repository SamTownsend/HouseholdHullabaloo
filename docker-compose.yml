services:
  mongodb:
    image: mongo:8
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017
      - DB_NAME=householdhullabaloo
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
